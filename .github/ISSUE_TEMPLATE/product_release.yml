name: Product Release Procedure
description: Track and coordinate product release activities
title: "[Release] "
labels: ["release", "procedure"]
body:
  - type: markdown
    attributes:
      value: |
        **🚀 Product Release Coordination**
        Use this template to track all activities and requirements for a product release.

  - type: input
    id: version
    attributes:
      label: Release Version
      description: Which version are you releasing?
      placeholder: "v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: release-type
    attributes:
      label: Release Type
      description: What type of release is this?
      options:
        - Major release
        - Minor release
        - Patch release
        - Hotfix
        - Beta release
        - Release candidate
    validations:
      required: true

  - type: input
    id: target-date
    attributes:
      label: Target Release Date
      description: When do you plan to release this version?
      placeholder: "2024-03-15"
    validations:
      required: true

  - type: textarea
    id: release-summary
    attributes:
      label: Release Summary
      description: A brief summary of what is included in this release
      placeholder: "Key features, critical bug fixes, breaking changes, etc."
    validations:
      required: true

  - type: checkboxes
    id: pre-release-checklist
    attributes:
      label: Pre-Release Checklist
      description: Complete these tasks before the release
      options:
        - label: All features and fixes have been merged into the main branch
        - label: Version numbers have been updated in all relevant files
        - label: CHANGELOG has been updated
        - label: Documentation has been updated
        - label: All tests are passing
        - label: Code review process is complete
        - label: Security scan is complete (if applicable)
        - label: Performance testing is complete (if applicable)
        - label: Database migrations have been tested (if applicable)
        - label: Deployment scripts / configuration have been updated

  - type: checkboxes
    id: testing-checklist
    attributes:
      label: Testing Checklist
      description: Verify test coverage
      options:
        - label: Unit tests are passing
        - label: Integration tests are passing
        - label: End-to-end tests are passing
        - label: Manual testing is complete
        - label: Regression testing is complete
        - label: User acceptance testing (UAT) is complete
        - label: Load / performance testing (if needed)
        - label: Security testing (if needed)

  - type: checkboxes
    id: deployment-checklist
    attributes:
      label: Deployment Checklist
      description: Prepare and execute the deployment
      options:
        - label: Deployment plan is documented
        - label: Rollback plan is prepared
        - label: Deployment scripts have been tested
        - label: Database backup is complete (if applicable)
        - label: Maintenance window is scheduled (if needed)
        - label: Stakeholders have been notified of the deployment time
        - label: Monitoring and alerting are configured
        - label: Health checks are prepared

  - type: checkboxes
    id: post-release-checklist
    attributes:
      label: Post-Release Checklist
      description: Activities to complete after the release
      options:
        - label: Release was deployed successfully
        - label: Health checks have been verified
        - label: Monitoring confirms system stability
        - label: Release notes have been published
        - label: Stakeholders have been notified of the successful release
        - label: Release has been tagged in version control
        - label: Release artifacts have been archived
        - label: Post-release review has been scheduled

  - type: textarea
    id: known-issues
    attributes:
      label: Known Issues
      description: Known issues or limitations in this release
      placeholder: "List any known bugs, limitations, or areas that need attention"

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies & Prerequisites
      description: Dependencies or prerequisites for this release
      placeholder: "External dependencies, infrastructure changes, third-party services, etc."

  - type: textarea
    id: communication-plan
    attributes:
      label: Communication Plan
      description: How will this release be communicated?
      placeholder: "User announcements, team notifications, documentation updates, etc."

  - type: textarea
    id: rollback-plan
    attributes:
      label: Rollback Plan
      description: Rollback plan in case issues arise
      placeholder: "Rollback steps, time requirements, data considerations, etc."

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Any other relevant information
      placeholder: "Special considerations, lessons learned, follow-up tasks, etc."
